name: Release

# Triggered automatically when a "Release v*" PR is merged into main.
# To start a release: Actions → Prepare Release → Run workflow → enter version.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

# ────────────────────────────────────────────────────────────────────────────
# Gate: only run for merged PRs whose title starts with "Release v"
# ────────────────────────────────────────────────────────────────────────────
jobs:

  tag:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'Release v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Extract version and push tag
        id: meta
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          VERSION="${TITLE#Release v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          echo "Tagged v$VERSION at $(git rev-parse HEAD)"

      - name: Trigger container build
        run: |
          gh workflow run container.yml \
            --ref v${{ steps.meta.outputs.version }} \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  # Native CLI binaries
  # ────────────────────────────────────────────────────────────────────────
  build:
    needs: tag
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-x86_64"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-x86_64-musl"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-aarch64"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-aarch64-musl"
          - target: aarch64-apple-darwin
            os: macos-latest
            binary-suffix: ""
            archive-suffix: "macos-aarch64"
          - target: x86_64-apple-darwin
            os: macos-latest
            binary-suffix: ""
            archive-suffix: "macos-x86_64"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary-suffix: ".exe"
            archive-suffix: "windows-x86_64"

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Ensure rustup (for act/local)
        if: runner.os == 'Linux'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            source $HOME/.cargo/env
          fi
        shell: bash

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: ${{ matrix.target }}
          components: rust-src, rust-std, cargo

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          cache-targets: "true"
          cache-all-crates: "true"
          shared-key: "release"

      - name: Install cross (Linux)
        if: runner.os == 'Linux'
        run: cargo install cross --locked || true
        shell: bash

      - name: Build release binary
        run: |
          source $HOME/.cargo/env || true
          T="${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cross build --release --target "$T" -p bamnado
          else
            cargo build --release --target "$T" -p bamnado
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: bamnado-${{ matrix.archive-suffix }}
          path: target/${{ matrix.target }}/release/bamnado${{ matrix.binary-suffix }}

  # ────────────────────────────────────────────────────────────────────────
  # Python wheels
  # ────────────────────────────────────────────────────────────────────────
  python-build:
    needs: tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # ────────────────────────────────────────────────────────────────────────
  # Python sdist
  # ────────────────────────────────────────────────────────────────────────
  python-sdist:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ────────────────────────────────────────────────────────────────────────
  # Rust API docs
  # ────────────────────────────────────────────────────────────────────────
  build-docs:
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --no-deps --all-features
      - run: echo '<meta http-equiv="refresh" content="0; url=bamnado/index.html">' > target/doc/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc

  # ────────────────────────────────────────────────────────────────────────
  # Publish to crates.io, PyPI, GitHub Pages + create GitHub Release
  # ────────────────────────────────────────────────────────────────────────
  release:
    name: Publish & Release
    runs-on: ubuntu-latest
    needs: [tag, build, python-build, python-sdist, build-docs]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
          cache-all-crates: "true"

      - name: Verify version consistency
        run: |
          VERSION="${{ needs.tag.outputs.version }}"

          BAMNADO_VERSION=$(grep "^version" bamnado/Cargo.toml | head -1 | cut -d'"' -f2)
          BAMNADO_PY_VERSION=$(grep "^version" bamnado-python/Cargo.toml | head -1 | cut -d'"' -f2)
          PYPROJECT_VERSION=$(grep "^version" pyproject.toml | head -1 | cut -d'"' -f2)

          echo "Git tag version: v$VERSION"
          echo "bamnado/Cargo.toml: $BAMNADO_VERSION"
          echo "bamnado-python/Cargo.toml: $BAMNADO_PY_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"

          if [ "$BAMNADO_VERSION" != "$VERSION" ] || [ "$BAMNADO_PY_VERSION" != "$VERSION" ] || [ "$PYPROJECT_VERSION" != "$VERSION" ]; then
            echo "❌ Version mismatch! All versions must match the git tag."
            exit 1
          fi

          echo "✅ All versions are consistent: v$VERSION"

      - name: Publish bamnado to crates.io
        run: cargo publish -p bamnado
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Python package to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing artifacts/**/*.whl artifacts/**/*.tar.gz
        continue-on-error: false

      - name: Deploy Rust docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/docs

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "bamnado*" -not -path "*/wheels-*" -type f | while read file; do
            DIR=$(basename "$(dirname "$file")")
            case "$DIR" in
              bamnado-linux-x86_64)       cp "$file" release-assets/bamnado-linux-x86_64 ;;
              bamnado-linux-x86_64-musl)  cp "$file" release-assets/bamnado-linux-x86_64-musl ;;
              bamnado-linux-aarch64)      cp "$file" release-assets/bamnado-linux-aarch64 ;;
              bamnado-linux-aarch64-musl) cp "$file" release-assets/bamnado-linux-aarch64-musl ;;
              bamnado-macos-aarch64)      cp "$file" release-assets/bamnado-macos-aarch64 ;;
              bamnado-macos-x86_64)       cp "$file" release-assets/bamnado-macos-x86_64 ;;
              bamnado-windows-x86_64)     cp "$file" release-assets/bamnado-windows-x86_64.exe ;;
            esac
          done
          find artifacts -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} release-assets/
          chmod +x release-assets/bamnado-linux-* release-assets/bamnado-macos-* 2>/dev/null || true
          ls -la release-assets/

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

# Primary trigger: go to Actions → Release → "Run workflow" → enter version
# Secondary trigger: push a v* tag (must be on main HEAD)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version — no v prefix (e.g. 0.5.0)'
        required: true
        type: string
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short

# ────────────────────────────────────────────────────────────────────────────
# 1. PREPARE — bump all version files, commit to main, create/update the tag
# ────────────────────────────────────────────────────────────────────────────
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha: ${{ steps.push.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          # Use a PAT so the push can trigger downstream workflows if needed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip leading 'v' from tag name
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          # Basic semver sanity check
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Version '$VERSION' does not look like semver (X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Bump version in Cargo manifests and pyproject.toml
        run: |
          V="${{ steps.meta.outputs.version }}"
          # Replace only the *first* `version = "..."` line in each Cargo.toml
          sed -i "0,/^version =/s/^version = \".*\"/version = \"$V\"/" bamnado/Cargo.toml
          sed -i "0,/^version =/s/^version = \".*\"/version = \"$V\"/" bamnado-python/Cargo.toml
          # pyproject.toml: version is under [project], first occurrence is correct
          sed -i "0,/^version =/s/^version = \".*\"/version = \"$V\"/" pyproject.toml
          echo "All version files updated to $V"
          grep '^version' bamnado/Cargo.toml bamnado-python/Cargo.toml pyproject.toml

      - name: Commit, tag, and push
        id: push
        run: |
          V="${{ steps.meta.outputs.version }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add bamnado/Cargo.toml bamnado-python/Cargo.toml pyproject.toml
          if git diff --staged --quiet; then
            echo "Version files already at $V — nothing to commit"
          else
            git commit -m "chore: release v$V"
          fi
          # Create or force-update the tag so it always points to the bumped commit
          git tag -f "v$V"
          git push origin main
          git push origin "v$V" --force
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────
  # 2a. BUILD — native CLI binaries for all platforms
  # ────────────────────────────────────────────────────────────────────────
  build:
    needs: prepare
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-x86_64"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-x86_64-musl"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-aarch64"
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            binary-suffix: ""
            archive-suffix: "linux-aarch64-musl"
          - target: aarch64-apple-darwin
            os: macos-latest
            binary-suffix: ""
            archive-suffix: "macos-aarch64"
          - target: x86_64-apple-darwin
            os: macos-latest
            binary-suffix: ""
            archive-suffix: "macos-x86_64"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary-suffix: ".exe"
            archive-suffix: "windows-x86_64"

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Ensure rustup (for act/local)
        if: runner.os == 'Linux'
        run: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            source $HOME/.cargo/env
          fi
        shell: bash

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: ${{ matrix.target }}
          components: rust-src, rust-std, cargo

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          cache-targets: "true"
          cache-all-crates: "true"
          shared-key: "release"

      - name: Install cross (Linux cross-compilation)
        if: runner.os == 'Linux'
        run: cargo install cross --locked || true
        shell: bash

      - name: Build release binary
        run: |
          source $HOME/.cargo/env || true
          T="${{ matrix.target }}"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cross build --release --target "$T" -p bamnado
          else
            cargo build --release --target "$T" -p bamnado
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: bamnado-${{ matrix.archive-suffix }}
          path: target/${{ matrix.target }}/release/bamnado${{ matrix.binary-suffix }}

  # ────────────────────────────────────────────────────────────────────────
  # 2b. PYTHON WHEELS
  # ────────────────────────────────────────────────────────────────────────
  python-build:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  # ────────────────────────────────────────────────────────────────────────
  # 2c. PYTHON SDIST
  # ────────────────────────────────────────────────────────────────────────
  python-sdist:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ────────────────────────────────────────────────────────────────────────
  # 2d. RUST DOCS
  # ────────────────────────────────────────────────────────────────────────
  build-docs:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo doc --no-deps --all-features
      - run: echo '<meta http-equiv="refresh" content="0; url=bamnado/index.html">' > target/doc/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: docs
          path: target/doc

  # ────────────────────────────────────────────────────────────────────────
  # 3. PUBLISH — crates.io, PyPI, GitHub Pages, GitHub Release
  # ────────────────────────────────────────────────────────────────────────
  release:
    name: Publish & Release
    runs-on: ubuntu-latest
    needs: [prepare, build, python-build, python-sdist, build-docs]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release"
          cache-all-crates: "true"

      - name: Publish bamnado to crates.io
        run: cargo publish -p bamnado
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish Python wheels to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing artifacts/**/*.whl artifacts/**/*.tar.gz

      - name: Deploy Rust docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: artifacts/docs

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "bamnado*" -not -path "*/wheels-*" -type f | while read file; do
            DIR=$(basename "$(dirname "$file")")
            case "$DIR" in
              bamnado-linux-x86_64)      cp "$file" release-assets/bamnado-linux-x86_64 ;;
              bamnado-linux-x86_64-musl) cp "$file" release-assets/bamnado-linux-x86_64-musl ;;
              bamnado-linux-aarch64)     cp "$file" release-assets/bamnado-linux-aarch64 ;;
              bamnado-linux-aarch64-musl)cp "$file" release-assets/bamnado-linux-aarch64-musl ;;
              bamnado-macos-aarch64)     cp "$file" release-assets/bamnado-macos-aarch64 ;;
              bamnado-macos-x86_64)      cp "$file" release-assets/bamnado-macos-x86_64 ;;
              bamnado-windows-x86_64)    cp "$file" release-assets/bamnado-windows-x86_64.exe ;;
            esac
          done
          find artifacts -name "*.whl" -o -name "*.tar.gz" | xargs -I{} cp {} release-assets/
          chmod +x release-assets/bamnado-linux-* release-assets/bamnado-macos-* 2>/dev/null || true
          ls -la release-assets/

      - uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
